# Decap CMS configuration for Sangci Company.
# Edits made in the CMS commit back to GitHub on `main`,
# which triggers a Vercel redeploy automatically.

backend:
  name: github
  repo: dsy1101/sangci-company-renewal-v2
  branch: main
  # OAuth proxy lives on the same origin as the site itself.
  base_url: https://b2b.sangcicompany.com
  auth_endpoint: api/auth
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'
    uploadMedia: 'CMS: upload {{path}}'
    deleteMedia: 'CMS: delete {{path}}'

# Image uploads land here and serialize as "assets/filename.png",
# which is exactly what js/app.js expects for product images.
media_folder: "assets"
public_folder: "assets"

# Korean UI by default.
locale: ko

# Disable preview links — the public site is the preview.
show_preview_links: false

collections:
  # ─────────────────────────────────────────────────────────────
  # JOURNAL — data/journal.json  (newest entry at the top)
  # Blog-style form: Korean is required, English/Bahasa are optional
  # (empty = falls back to Korean on those pages).
  # ─────────────────────────────────────────────────────────────
  - name: journal
    label: "비즈니스 저널"
    label_singular: "저널 글"
    editor:
      preview: false
    files:
      - name: journal_file
        label: "저널 전체 (새 글은 맨 위로 드래그)"
        file: "data/journal.json"
        format: "json"
        fields:
          - name: entries
            label: "저널 글 목록"
            label_singular: "저널 글"
            widget: list
            summary: "{{fields.date}} · {{fields.title.ko}}"
            fields:
              - name: date
                label: "날짜"
                widget: datetime
                date_format: "MMM D, YYYY"
                time_format: false
                format: "MMM D, YYYY"
                picker_utc: false
              - name: tag
                label: "분류"
                widget: select
                options:
                  - { label: "🤝 회의 (meeting)",       value: meeting }
                  - { label: "🌴 현장 점검 (field)",     value: field }
                  - { label: "🏭 공장 방문 (factory)",   value: factory }
                  - { label: "✈️  출장 (travel)",        value: travel }
                  - { label: "🎤 네트워킹 (networking)", value: networking }
              - { name: emoji, label: "썸네일 이모지 (카드 그리드에 표시)", widget: string, default: "📝", hint: "예: 🤝 🏭 ✈️ 🌴 🎤" }

              # ─── 한국어 (필수) ─────────────────────────────
              - { name: title_ko, label: "제목 (한국어 — 필수)", widget: string }
              - name: body_ko
                label: "본문 (한국어 — 필수)"
                widget: markdown
                hint: "사진·동영상·링크 본문 안에 자유롭게 삽입. 상단 툴바의 이미지 버튼으로 업로드 가능."
                modes: ["rich_text", "raw"]
                buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
                editor_components: [image, code-block]

              # ─── English (선택) ───────────────────────────
              - { name: title_en, label: "Title (English — 선택, 비우면 한국어 표시)", widget: string, required: false, default: "" }
              - name: body_en
                label: "Body (English — 선택, 비우면 한국어 표시)"
                widget: markdown
                required: false
                default: ""
                modes: ["rich_text", "raw"]
                buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
                editor_components: [image, code-block]

              # ─── Bahasa Indonesia (선택) ──────────────────
              - { name: title_id, label: "Judul (Bahasa — 선택, 비우면 한국어 표시)", widget: string, required: false, default: "" }
              - name: body_id
                label: "Isi (Bahasa — 선택, 비우면 한국어 표시)"
                widget: markdown
                required: false
                default: ""
                modes: ["rich_text", "raw"]
                buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
                editor_components: [image, code-block]

  # ─────────────────────────────────────────────────────────────
  # PRODUCTS — data/products.json
  # ─────────────────────────────────────────────────────────────
  - name: products
    label: "제품"
    label_singular: "제품 시리즈"
    editor:
      preview: false
    files:
      - name: products_file
        label: "제품 시리즈 전체"
        file: "data/products.json"
        format: "json"
        fields:
          - name: series
            label: "시리즈 목록"
            label_singular: "시리즈"
            widget: list
            summary: "#{{fields.id}} · {{fields.title.ko}}"
            fields:
              - { name: id, label: "시리즈 ID (숫자, 고유)", widget: number, value_type: int, min: 1 }
              - name: title
                label: "시리즈 제목"
                widget: object
                fields:
                  - { name: en, label: "English", widget: string }
                  - { name: id, label: "Bahasa",  widget: string }
                  - { name: ko, label: "한국어",   widget: string }
              - name: desc
                label: "시리즈 설명"
                widget: object
                fields:
                  - { name: en, label: "English", widget: text }
                  - { name: id, label: "Bahasa",  widget: text }
                  - { name: ko, label: "한국어",   widget: text }
              - name: items
                label: "상품 목록 (최소 1개)"
                label_singular: "상품"
                widget: list
                min: 1
                summary: "{{fields.name.ko}}"
                fields:
                  - { name: image,     label: "대표 이미지", widget: image }
                  - { name: detailImg, label: "상세 이미지 (클릭 시 팝업, 선택)", widget: image, required: false, default: "" }
                  - name: name
                    label: "상품명"
                    widget: object
                    fields:
                      - { name: en, label: "English", widget: string }
                      - { name: id, label: "Bahasa",  widget: string }
                      - { name: ko, label: "한국어",   widget: string }
                  - name: tags
                    label: "태그 (언어별 배열)"
                    widget: object
                    fields:
                      - name: en
                        label: "English tags"
                        widget: list
                        field: { name: tag, widget: string }
                      - name: id
                        label: "Bahasa tags"
                        widget: list
                        field: { name: tag, widget: string }
                      - name: ko
                        label: "한국어 태그"
                        widget: list
                        field: { name: tag, widget: string }
                  - name: desc
                    label: "상품 설명"
                    widget: object
                    fields:
                      - { name: en, label: "English", widget: text }
                      - { name: id, label: "Bahasa",  widget: text }
                      - { name: ko, label: "한국어",   widget: text }
